name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e . || true; fi

      - name: Run pytest
        run: |
          set +e
          pytest
          code=$?
          # exit 5 == no tests collected; treat as success until tests exist
          if [ $code -eq 5 ]; then
            echo "::notice::pytest collected no tests — passing per project policy"
            exit 0
          fi
          exit $code
